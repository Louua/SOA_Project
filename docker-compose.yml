version: '3.8'

services:
  zookeeper:
    image: confluentinc/cp-zookeeper:7.3.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.3.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  patient-service:
    build:
      context: ./patient-service
    depends_on:
      - kafka
    environment:
      - PORT=50051
      - USE_KAFKA=true
      - KAFKA_BROKER=kafka:29092
    ports:
      - "50051:50051"

  appointment-service:
    build:
      context: ./appointment-service
    environment:
      - PORT=50052
    ports:
      - "50052:50052"

  emergency-service:
    build:
      context: ./emergency-service
    depends_on:
      - kafka
    environment:
      - PORT=50053
      - USE_KAFKA=true
      - KAFKA_BROKER=kafka:29092
    ports:
      - "50053:50053"

  api-gateway:
    build:
      context: ./api-gateway
    depends_on:
      - patient-service
      - appointment-service
      - emergency-service
    environment:
      - PORT=3000
      - PATIENT_SVC_URL=patient-service:50051
      - APPOINTMENT_SVC_URL=appointment-service:50052
      - EMERGENCY_SVC_URL=emergency-service:50053
    ports:
      - "3000:3000"
