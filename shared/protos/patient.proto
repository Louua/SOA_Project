syntax = "proto3";

package clinic;

service PatientService {
  rpc GetPatientById (PatientRequest) returns (PatientResponse);
  rpc CreatePatient (CreatePatientRequest) returns (PatientResponse);
  rpc UpdatePatientVitals (UpdateVitalsRequest) returns (UpdateVitalsResponse);
  rpc GetAllPatients (Empty) returns (PatientsResponse);
}

message Empty {}

message PatientsResponse {
  repeated PatientResponse patients = 1;
}

message PatientRequest {
  string id = 1;
}

message PatientResponse {
  string id = 1;
  string name = 2;
  string medical_history = 3;
  int32 heart_rate = 4;
  float temperature = 5;
}

message CreatePatientRequest {
  string name = 1;
  string medical_history = 2;
}

message UpdateVitalsRequest {
  string patient_id = 1;
  int32 heart_rate = 2;
  float temperature = 3;
}

message UpdateVitalsResponse {
  bool success = 1;
  string message = 2;
}
